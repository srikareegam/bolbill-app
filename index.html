<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Bol Bill — Voice Billing</title>
<meta name="theme-color" content="#0F6B52">
<meta name="description" content="Voice billing app for shops — speak product, quantity and price, print the bill on your thermal printer.">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app" class="with-nav">

  <div class="shopcard" id="shopCard">
    <div class="row1">
      <div>
        <div class="shop-name" id="disp-shopName">Loading…</div>
        <div class="shop-meta" id="disp-shopMeta"></div>
      </div>
      <a class="edit-shop-btn" href="settings.html">✎ Edit</a>
    </div>
    <div class="bill-strip">
      <span>NEXT BILL #<b id="disp-billNo">----</b></span>
      <span id="disp-date">—</span>
    </div>
  </div>

  <div class="section-label">Customer (optional)</div>
  <div class="customer-row">
    <input type="text" id="customerName" placeholder="Customer name">
    <input type="tel" id="customerPhone" placeholder="Phone" style="max-width:120px;">
  </div>

  <div class="section-label">
    <span>Items</span>
    <span style="margin-left:auto; display:flex; gap:14px;">
      <button class="icon-btn" id="btnManualAdd">+ Manual</button>
      <button class="icon-btn" id="btnNew">↺ New</button>
    </span>
  </div>
  <div class="receipt-card">
    <div class="zigzag-top"></div>
    <div id="itemsList"></div>
  </div>

  <div class="totals" id="totalsBox"></div>

</div>

<div class="actionbar">
  <div class="actionbar-inner">
    <button class="btn btn-secondary" id="btnSaveOnly">💾<br>Save</button>
    <button class="mic-btn" id="btnMic">🎤</button>
    <button class="btn btn-print" id="btnPrintSave">🖨<br>Print &amp; Save</button>
  </div>
</div>
<div class="mic-caption" id="micCaption"></div>

<nav class="bottom-nav">
  <a class="nav-item active" href="index.html"><span class="nav-glyph">🧾</span>Bill</a>
  <a class="nav-item" href="history.html"><span class="nav-glyph">📜</span>History</a>
  <a class="nav-item" href="summary.html"><span class="nav-glyph">📊</span>Summary</a>
  <a class="nav-item" href="settings.html"><span class="nav-glyph">⚙️</span>Settings</a>
</nav>

<!-- Voice confirm modal -->
<div class="modal-backdrop hidden" id="modalVoice">
  <div class="modal">
    <div class="modal-title">Confirm item</div>
    <div class="modal-sub">Check what I heard, fix anything, then add it</div>
    <div class="heard-text" id="heardText">—</div>
    <div class="field"><label>Product name</label><input type="text" id="v-name"></div>
    <div class="parsed-row">
      <div class="field"><label>Quantity</label><input type="number" id="v-qty" inputmode="decimal"></div>
      <div class="field"><label>Price / unit ₹</label><input type="number" id="v-price" inputmode="decimal"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnCancelVoice">Discard</button>
      <button class="btn btn-primary" id="btnAddVoice">Add to bill</button>
    </div>
  </div>
</div>

<!-- Manual add fallback -->
<div class="modal-backdrop hidden" id="modalManual">
  <div class="modal">
    <div class="modal-title">Add item manually</div>
    <div class="modal-sub">If your phone can't hear you right now</div>
    <div class="field"><label>Product name</label><input type="text" id="m-name" placeholder="e.g. Sugar"></div>
    <div class="parsed-row">
      <div class="field"><label>Quantity</label><input type="number" id="m-qty" value="1" inputmode="decimal"></div>
      <div class="field"><label>Price / unit ₹</label><input type="number" id="m-price" inputmode="decimal"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnCancelManual">Cancel</button>
      <button class="btn btn-primary" id="btnAddManual">Add to bill</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Print template -->
<div id="printArea">
  <div class="p-center">
    <div class="p-shop-name" id="pr-shopName"></div>
    <div class="p-meta" id="pr-shopAddress"></div>
    <div class="p-meta" id="pr-shopPhone"></div>
    <div class="p-meta" id="pr-shopGst"></div>
  </div>
  <div class="p-rule"></div>
  <div class="p-row"><span id="pr-billNo"></span><span id="pr-date"></span></div>
  <div class="p-row" id="pr-customerRow"></div>
  <div class="p-rule"></div>
  <div id="pr-items"></div>
  <div class="p-rule"></div>
  <div class="p-row"><span>Subtotal</span><span id="pr-subtotal"></span></div>
  <div class="p-row" id="pr-taxRow"></div>
  <div class="p-row p-total"><span>TOTAL</span><span id="pr-total"></span></div>
  <div class="p-footer" id="pr-footer"></div>
</div>

<script type="module">
import { requireShopOrRedirect, subscribeSettings, createBillAtomic } from "./data.js";

const shop = requireShopOrRedirect();
if (shop) {
  const $ = (id) => document.getElementById(id);
  const rupee = (n) => "₹" + (Math.round(n*100)/100).toFixed(2);
  let settings = { shopName:"", shopAddress:"", shopPhone:"", shopGst:"", shopFooter:"", taxRate:0, nextBillNo:1 };
  let items = [];
  let customerName = "", customerPhone = "";

  function toast(msg){
    const t = $("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toast._h);
    toast._h = setTimeout(()=>t.classList.remove("show"), 2200);
  }
  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }
  function titleCase(s){ return s.replace(/\w\S*/g, t => t.charAt(0).toUpperCase()+t.slice(1)); }

  // ---------- Live shop settings ----------
  subscribeSettings(shop.shopCode, (data) => {
    settings = data;
    $("disp-shopName").textContent = settings.shopName || "Your Shop";
    const metaBits = [settings.shopAddress, settings.shopPhone].filter(Boolean);
    $("disp-shopMeta").textContent = metaBits.join(" · ");
    $("disp-billNo").textContent = String(settings.nextBillNo || 1).padStart(4,"0");
    renderTotals();
  });
  $("disp-date").textContent = new Date().toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});

  // ---------- Items ----------
  function renderItems(){
    const list = $("itemsList");
    if(items.length === 0){
      list.innerHTML = `<div class="empty-state">
        <div class="glyph">🧾</div>
        <div class="t1">No items yet</div>
        <div class="t2">Tap the mic below and say something like<br>"Sugar 2 kilo 90 rupees"</div>
      </div>`;
    } else {
      list.innerHTML = items.map((it, i) => `
        <div class="item-row">
          <div class="item-idx">${i+1}</div>
          <div class="item-info">
            <div class="item-name">${escapeHtml(it.name)}</div>
            <div class="item-sub">${it.qty} × ${rupee(it.price)}</div>
          </div>
          <div class="item-amt">${rupee(it.qty*it.price)}</div>
          <button class="item-del" data-id="${it.id}">✕</button>
        </div>
      `).join("");
    }
    list.querySelectorAll(".item-del").forEach(btn=>{
      btn.onclick = () => { items = items.filter(it => it.id !== btn.dataset.id); renderItems(); };
    });
    renderTotals();
  }

  function computeTotals(){
    const subtotal = items.reduce((s,it)=> s + it.qty*it.price, 0);
    const tax = subtotal * (settings.taxRate||0) / 100;
    return { subtotal, tax, total: subtotal+tax };
  }
  function renderTotals(){
    const { subtotal, tax, total } = computeTotals();
    let html = `<div class="totals-line"><span>Subtotal</span><span class="amt">${rupee(subtotal)}</span></div>`;
    if(settings.taxRate){ html += `<div class="totals-line"><span>Tax (${settings.taxRate}%)</span><span class="amt">${rupee(tax)}</span></div>`; }
    html += `<div class="totals-line grand"><span>Total</span><span class="amt">${rupee(total)}</span></div>`;
    $("totalsBox").innerHTML = html;
  }
  renderItems();

  $("btnNew").onclick = () => {
    if(items.length && !confirm("Start a new bill? Unsaved items will be cleared.")) return;
    items = []; customerName=""; customerPhone="";
    $("customerName").value=""; $("customerPhone").value="";
    renderItems();
    toast("New bill started");
  };
  $("customerName").oninput = e => customerName = e.target.value;
  $("customerPhone").oninput = e => customerPhone = e.target.value;
  $("btnManualAdd").onclick = () => $("modalManual").classList.remove("hidden");

  // ---------- Manual add ----------
  $("btnAddManual").onclick = () => {
    const name = $("m-name").value.trim();
    const qty = parseFloat($("m-qty").value) || 1;
    const price = parseFloat($("m-price").value) || 0;
    if(!name){ toast("Enter a product name"); return; }
    items.push({ id: Date.now()+"_"+Math.random().toString(36).slice(2), name: titleCase(name), qty, price });
    renderItems();
    $("modalManual").classList.add("hidden");
    $("m-name").value=""; $("m-qty").value="1"; $("m-price").value="";
  };
  $("btnCancelManual").onclick = () => $("modalManual").classList.add("hidden");

  // ---------- Voice ----------
  let recognition = null, listening = false;
  function setupSpeech(){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){
      $("btnMic").innerHTML = "＋";
      $("micCaption").textContent = "Voice not supported here — tap to add manually";
      $("btnMic").onclick = () => $("modalManual").classList.remove("hidden");
      return;
    }
    recognition = new SR();
    recognition.lang = "en-IN";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.onstart = () => { listening = true; $("btnMic").classList.add("listening"); $("micCaption").textContent = "Listening… say: product, quantity, price"; };
    recognition.onend = () => { listening = false; $("btnMic").classList.remove("listening"); if(!$("modalVoice").classList.contains("hidden")) return; $("micCaption").textContent = ""; };
    recognition.onerror = (e) => {
      listening = false; $("btnMic").classList.remove("listening");
      if(e.error === "not-allowed" || e.error === "service-not-allowed") $("micCaption").textContent = "Mic permission blocked — allow it in browser settings";
      else if(e.error === "no-speech") $("micCaption").textContent = "Didn't catch that — tap and try again";
      else $("micCaption").textContent = "Voice error — try again or add manually";
    };
    recognition.onresult = (e) => handleVoiceResult(e.results[0][0].transcript);
    $("btnMic").onclick = () => { if(listening){ recognition.stop(); return; } try{ recognition.start(); }catch(err){} };
    let pressTimer;
    $("btnMic").addEventListener("touchstart", ()=>{ pressTimer = setTimeout(()=>{ $("modalManual").classList.remove("hidden"); }, 650); });
    $("btnMic").addEventListener("touchend", ()=> clearTimeout(pressTimer));
  }

  function parseVoiceText(raw){
    let text = raw.toLowerCase().trim();
    const wordNums = {zero:"0",one:"1",two:"2",three:"3",four:"4",five:"5",six:"6",seven:"7",eight:"8",nine:"9",ten:"10",eleven:"11",twelve:"12",twenty:"20",thirty:"30",forty:"40",fifty:"50",hundred:"100"};
    Object.keys(wordNums).forEach(w=>{ text = text.replace(new RegExp("\\b"+w+"\\b","g"), wordNums[w]); });
    const numMatches = [...text.matchAll(/\d+(\.\d+)?/g)].map(m=>parseFloat(m[0]));
    let name = text.replace(/\d+(\.\d+)?/g, " ")
      .replace(/\b(kg|kilo|kilos|gram|grams|gm|gms|litre|liter|litres|liters|ltr|pcs|piece|pieces|pc|packet|packets|box|boxes|dozen|rupees|rupee|rs|inr|for|at|only|each|of|the|a|an|is)\b/g, " ")
      .replace(/\s+/g, " ").trim();
    let qty = 1, price = 0;
    if(numMatches.length >= 2){ qty = numMatches[0]; price = numMatches[1]; }
    else if(numMatches.length === 1){ price = numMatches[0]; }
    if(!name) name = "Item";
    return { name: titleCase(name), qty, price };
  }

  function handleVoiceResult(raw){
    const parsed = parseVoiceText(raw);
    $("heardText").textContent = '"' + raw + '"';
    $("v-name").value = parsed.name; $("v-qty").value = parsed.qty; $("v-price").value = parsed.price;
    $("modalVoice").classList.remove("hidden");
    $("micCaption").textContent = "";
  }
  $("btnAddVoice").onclick = () => {
    const name = $("v-name").value.trim() || "Item";
    const qty = parseFloat($("v-qty").value) || 1;
    const price = parseFloat($("v-price").value) || 0;
    items.push({ id: Date.now()+"_"+Math.random().toString(36).slice(2), name: titleCase(name), qty, price });
    renderItems();
    $("modalVoice").classList.add("hidden");
    toast("Item added");
  };
  $("btnCancelVoice").onclick = () => $("modalVoice").classList.add("hidden");

  // ---------- WhatsApp ----------
  function formatWaNumber(phone){
    let digits = (phone || "").replace(/\D/g, "");
    if (!digits) return null;
    if (digits.length === 10) digits = "91" + digits; // assume Indian number if no country code given
    return digits;
  }
  function buildWhatsAppMessage(billNo, totals){
    const lines = [];
    lines.push(`*${settings.shopName || "Your Shop"}*`);
    if (settings.shopPhone) lines.push(`Ph: ${settings.shopPhone}`);
    lines.push("");
    lines.push(`Bill #${String(billNo).padStart(4,"0")} · ${new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}`);
    lines.push("");
    items.forEach(it => lines.push(`${it.name} — ${it.qty} × ${rupee(it.price)} = ${rupee(it.qty*it.price)}`));
    lines.push("");
    if (settings.taxRate) lines.push(`Subtotal: ${rupee(totals.subtotal)}`);
    if (settings.taxRate) lines.push(`Tax (${settings.taxRate}%): ${rupee(totals.tax)}`);
    lines.push(`*Total: ${rupee(totals.total)}*`);
    if (settings.shopFooter) { lines.push(""); lines.push(settings.shopFooter); }
    return lines.join("\n");
  }
  function sendViaWhatsApp(billNo, totals){
    const waNumber = formatWaNumber(customerPhone);
    if (!waNumber) return;
    const text = encodeURIComponent(buildWhatsAppMessage(billNo, totals));
    window.open(`https://wa.me/${waNumber}?text=${text}`, "_blank");
  }

  // ---------- Print template ----------
  function buildPrintArea(billNo, totals){
    $("pr-shopName").textContent = settings.shopName || "Your Shop";
    $("pr-shopAddress").textContent = settings.shopAddress || "";
    $("pr-shopPhone").textContent = settings.shopPhone ? ("Ph: " + settings.shopPhone) : "";
    $("pr-shopGst").textContent = settings.shopGst ? ("GSTIN: " + settings.shopGst) : "";
    $("pr-billNo").textContent = "Bill #" + String(billNo).padStart(4,"0");
    $("pr-date").textContent = new Date().toLocaleString('en-IN', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
    $("pr-customerRow").innerHTML = customerName ? `<span>Customer</span><span>${escapeHtml(customerName)}${customerPhone ? " · "+escapeHtml(customerPhone) : ""}</span>` : "";
    $("pr-items").innerHTML = items.map((it,i)=>`
      <div class="p-item-name">${i+1}. ${escapeHtml(it.name)}</div>
      <div class="p-item-sub"><span>${it.qty} × ${rupee(it.price)}</span><span>${rupee(it.qty*it.price)}</span></div>
    `).join("");
    $("pr-subtotal").textContent = rupee(totals.subtotal);
    $("pr-taxRow").innerHTML = settings.taxRate ? `<span>Tax (${settings.taxRate}%)</span><span>${rupee(totals.tax)}</span>` : "";
    $("pr-total").textContent = rupee(totals.total);
    $("pr-footer").textContent = settings.shopFooter || "";
  }

  // ---------- Save (shared by both buttons; atomic bill number across all devices) ----------
  async function saveBill({ alsoPrint }){
    if(items.length === 0){ toast("Add at least one item first"); return; }
    const btn = alsoPrint ? $("btnPrintSave") : $("btnSaveOnly");
    const originalLabel = btn.innerHTML;
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    try{
      const totals = computeTotals();
      const billData = {
        items: items.slice(), customerName, customerPhone,
        subtotal: totals.subtotal, tax: totals.tax, total: totals.total
      };
      const billNo = await createBillAtomic(shop.shopCode, billData);
      if (alsoPrint){
        buildPrintArea(billNo, totals);
        window.print();
      }
      sendViaWhatsApp(billNo, totals);
      items = []; customerName=""; customerPhone="";
      $("customerName").value=""; $("customerPhone").value="";
      renderItems();
      toast("Bill #" + String(billNo).padStart(4,"0") + " saved");
    }catch(e){
      console.error(e);
      toast("Couldn't save the bill — check your connection");
    }
    btn.disabled = false; btn.innerHTML = originalLabel;
  }

  $("btnSaveOnly").onclick = () => saveBill({ alsoPrint: false });
  $("btnPrintSave").onclick = () => saveBill({ alsoPrint: true });

  setupSpeech();
}
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
